<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぷにぷに風ゲーム</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #222;
  color: white;
  text-align: center;
}
#game {
  width: 320px;
  height: 480px;
  margin: 20px auto;
  background: #111;
  border: 3px solid #555;
  position: relative;
  overflow: hidden;
}
.puni {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  position: absolute;
  cursor: pointer;
  transition: transform 0.1s;
}
.puni:active {
  transform: scale(1.3);
}
#score {
  font-size: 20px;
}
</style>
</head>
<body>
<h1>ぷにぷに風ゲーム</h1>
<div id="score">スコア: 0</div>
<div id="game"></div>

<script>
const game = document.getElementById("game");
const scoreDisplay = document.getElementById("score");
let score = 0;

const colors = ["#ff4d4d", "#4dff4d", "#4d4dff", "#ffff4d", "#ff4dff"];

function createPuni() {
  const puni = document.createElement("div");
  puni.classList.add("puni");

  const size = Math.random() * 30 + 40;
  puni.style.width = size + "px";
  puni.style.height = size + "px";

  puni.style.background = colors[Math.floor(Math.random() * colors.length)];

  const x = Math.random() * (game.clientWidth - size);
  const y = Math.random() * (game.clientHeight - size);

  puni.style.left = x + "px";
  puni.style.top = y + "px";

  puni.addEventListener("click", () => {
    score += 10;
    scoreDisplay.textContent = "スコア: " + score;
    puni.remove();
  });

  game.appendChild(puni);

  setTimeout(() => {
    if (game.contains(puni)) {
      puni.remove();
    }
  }, 2000);
}

setInterval(createPuni, 500);
</script>
</body>
</html>
