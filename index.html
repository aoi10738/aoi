<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>音楽ゲーム</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: sans-serif;
}

#game {
    position: relative;
    width: 300px;
    height: 500px;
    margin: 20px auto;
    border: 2px solid white;
    overflow: hidden;
}

.note {
    position: absolute;
    width: 100%;
    height: 20px;
    background: cyan;
    top: 0;
}

#judgeLine {
    position: absolute;
    bottom: 50px;
    width: 100%;
    height: 5px;
    background: red;
}

#score {
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>🎧 音楽ゲーム</h1>
<p>Fキーでタイミングよく押せ！</p>

<div id="game">
    <div id="judgeLine"></div>
</div>

<div id="score">Score: 0</div>
<div id="result"></div>

<script>
let game = document.getElementById("game");
let score = 0;
let notes = [];

function createNote() {
    let note = document.createElement("div");
    note.className = "note";
    note.style.top = "0px";
    game.appendChild(note);

    notes.push(note);
}

function update() {
    notes.forEach((note, index) => {
        let top = parseInt(note.style.top);
        note.style.top = top + 4 + "px";

        if (top > 500) {
            note.remove();
            notes.splice(index, 1);
        }
    });
}

function judge() {
    let line = 450;

    notes.forEach((note, index) => {
        let top = parseInt(note.style.top);
        let diff = Math.abs(top - line);

        if (diff < 20) {
            showResult("Perfect");
            score += 100;
            note.remove();
            notes.splice(index, 1);
        } else if (diff < 40) {
            showResult("Good");
            score += 50;
            note.remove();
            notes.splice(index, 1);
        }
    });

    document.getElementById("score").innerText = "Score: " + score;
}

function showResult(text) {
    let result = document.getElementById("result");
    result.innerText = text;

    setTimeout(() => {
        result.innerText = "";
    }, 500);
}

setInterval(createNote, 1000);
setInterval(update, 16);

document.addEventListener("keydown", (e) => {
    if (e.key === "f") {
        judge();
    }
});
</script>

</body>
</html>
