<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>避けゲー</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}
#player {
    width: 30px;
    height: 30px;
    background: cyan;
    position: absolute;
    top: 200px;
    left: 200px;
}
.enemy {
    width: 20px;
    height: 20px;
    background: red;
    position: absolute;
}
#score {
    color: white;
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 20px;
}
</style>
</head>
<body>

<div id="player"></div>
<div id="score">0</div>

<script>
const player = document.getElementById("player");
const scoreEl = document.getElementById("score");

let px = 200, py = 200;
let speed = 5;
let enemies = [];
let keys = {};
let score = 0;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function createEnemy() {
    const enemy = document.createElement("div");
    enemy.className = "enemy";
    
    let x = Math.random() * window.innerWidth;
    let y = -20;
    let vy = Math.random() * 3 + 2 + score/100;

    enemy.style.left = x + "px";
    enemy.style.top = y + "px";

    document.body.appendChild(enemy);
    enemies.push({el: enemy, x, y, vy});
}

function update() {
    // 移動
    if (keys["ArrowUp"]) py -= speed;
    if (keys["ArrowDown"]) py += speed;
    if (keys["ArrowLeft"]) px -= speed;
    if (keys["ArrowRight"]) px += speed;

    player.style.left = px + "px";
    player.style.top = py + "px";

    // 敵更新
    enemies.forEach((e, i) => {
        e.y += e.vy;
        e.el.style.top = e.y + "px";

        // 衝突判定
        if (
            px < e.x + 20 &&
            px + 30 > e.x &&
            py < e.y + 20 &&
            py + 30 > e.y
        ) {
            alert("ゲームオーバー！ スコア: " + score);
            location.reload();
        }

        // 画面外削除
        if (e.y > window.innerHeight) {
            e.el.remove();
            enemies.splice(i, 1);
            score++;
        }
    });

    scoreEl.textContent = "スコア: " + score;

    requestAnimationFrame(update);
}

// 敵生成ループ
setInterval(createEnemy, 800);

update();
</script>

</body>
</html>
